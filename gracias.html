<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias por inscribirte | PAE 2026</title>
  <style>
    :root {
      --primary: #2f6b3b;
      --primary-dark: #1f4c29;
      --secondary: #f4b400;
      --secondary-dark: #d99600;
      --accent-red: #d94b3d;
      --text: #1f2937;
      --white: #ffffff;
      --shadow: 0 14px 40px rgba(0,0,0,.10);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,245,207,.95) 0%, transparent 28%),
        radial-gradient(circle at bottom right, rgba(223,240,215,.9) 0%, transparent 24%),
        linear-gradient(180deg, #f9f8ef 0%, #eef6e8 100%);
      color: var(--text);
    }

    .wrap {
      width: min(1100px, calc(100% - 32px));
      margin: 40px auto;
    }

    .card {
      background: rgba(255,255,255,.95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid #eceddc;
    }

    .top-strip {
      height: 12px;
      background: linear-gradient(90deg, var(--primary) 0%, #6aa84f 35%, var(--secondary) 70%, var(--accent-red) 100%);
    }

    .top {
      background: linear-gradient(135deg, rgba(47,107,59,.97), rgba(91,153,78,.95));
      color: white;
      text-align: center;
      padding: 42px 20px;
      position: relative;
      overflow: hidden;
    }

    .top::before,
    .top::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      opacity: .16;
      background: #fff7cc;
    }

    .top::before {
      width: 220px;
      height: 220px;
      top: -80px;
      left: -50px;
    }

    .top::after {
      width: 160px;
      height: 160px;
      right: -20px;
      bottom: -40px;
      background: #f7c845;
    }

    .top-content {
      position: relative;
      z-index: 1;
    }

    .tag {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.24);
      margin-bottom: 14px;
      font-weight: 700;
    }

    .top h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .top p {
      margin: 0 auto;
      max-width: 800px;
      line-height: 1.7;
      font-size: 1.05rem;
    }

    .content {
      padding: 28px;
    }

    .message-box {
      background: linear-gradient(180deg, #fffaf0, #f4f8ea);
      border: 1px solid #eadfbb;
      border-radius: 18px;
      padding: 16px 18px;
      line-height: 1.6;
      color: #475569;
      margin-bottom: 20px;
    }

    .video-frame {
      background: #0f172a;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(15,23,42,.18);
      margin-top: 18px;
    }

    video {
      width: 100%;
      display: block;
      background: #0f172a;
    }

    .back {
      display: inline-block;
      margin-top: 24px;
      text-decoration: none;
      background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-dark) 100%);
      color: #1f2937;
      padding: 14px 22px;
      border-radius: 14px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="top-strip"></div>
      <div class="top">
        <div class="top-content">
          <div class="tag">Registro exitoso</div>
          <h1>¡Gracias por tu inscripción!</h1>
          <p>
            Tu registro a la Primera Mesa Pública 2026 del Programa de Alimentación Escolar ha sido recibido correctamente.
          </p>
        </div>
      </div>

      <div class="content">
        <div class="message-box">
          <strong>Continúa con el video informativo.</strong><br>
          A continuación podrás visualizar el contenido preparado para los participantes.
        </div>

        <div class="video-frame">
          <video controls autoplay>
            <source src="video.mp4" type="video/mp4" />
            Tu navegador no soporta la reproducción de video.
          </video>
        </div>

        <a class="back" href="index.html">Volver al formulario</a>
      </div>
    </section>
  </main>
</body>
</html>
